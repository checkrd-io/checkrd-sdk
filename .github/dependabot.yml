version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      rust-deps:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /wrappers/python
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /wrappers/javascript
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      js-deps:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      gha:
        patterns: ["*"]
