name: Feature request
description: Propose a new feature, integration, or behaviour change.
labels: [enhancement]
body:
  - type: dropdown
    id: sdk
    attributes:
      label: Scope
      options:
        - Python SDK
        - JavaScript SDK
        - WASM engine (crates/core)
        - Both SDKs
        - Other / cross-cutting
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what's painful about the current behaviour?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: |
        Describe the change you'd like to see. Sketch the API surface
        if it's a new public symbol; reference existing patterns in
        the codebase if it's a behavioural change.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've considered and why they don't fit.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, prior art, related issues, or use-case detail.
