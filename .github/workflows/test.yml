name: Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Compile the WASM core once and share the artifact with the language
  # jobs. Avoids paying the wasm32-wasip1 toolchain fetch + build cost on
  # every matrix cell.
  wasm-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: wasm-build
      - run: cargo build --package checkrd-core --target wasm32-wasip1 --release
      - uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: target/wasm32-wasip1/release/checkrd_core.wasm
          key: wasm-${{ github.sha }}

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: native
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  python:
    needs: wasm-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Matches ``requires-python = ">=3.10"`` in pyproject.toml.
        # 3.9 reached EOL in October 2025; the agent-framework
        # adapters need 3.10+ syntax in their own deps.
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: wrappers/python/pyproject.toml
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: target/wasm32-wasip1/release/checkrd_core.wasm
          key: wasm-${{ github.sha }}
          fail-on-cache-miss: true
      - name: Stage WASM artifact
        run: |
          cp target/wasm32-wasip1/release/checkrd_core.wasm wrappers/python/src/checkrd/
          HASH=$(sha256sum wrappers/python/src/checkrd/checkrd_core.wasm | cut -d' ' -f1)
          cat > wrappers/python/src/checkrd/_wasm_integrity.py << EOF
          # Auto-generated by CI — do not edit.
          EXPECTED_SHA256 = "$HASH"
          EOF
      - working-directory: wrappers/python
        run: |
          pip install -e ".[test]"
          ruff check src/ tests/
          mypy src/
          pip install pyright
          pyright src/
          pip-audit --ignore-vuln PYSEC-2022-42969
          interrogate src/
          pytest tests/ --cov --cov-fail-under=80

  javascript:
    needs: wasm-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # Matches ``engines.node: ">=20"`` in package.json. Node 18
        # reached Maintenance LTS EOL April 2025.
        node: [20, 22]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: wrappers/javascript/package-lock.json
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: target/wasm32-wasip1/release/checkrd_core.wasm
          key: wasm-${{ github.sha }}
          fail-on-cache-miss: true
      - name: Stage WASM artifact
        run: |
          cp target/wasm32-wasip1/release/checkrd_core.wasm wrappers/javascript/
          HASH=$(sha256sum wrappers/javascript/checkrd_core.wasm | cut -d' ' -f1)
          cat > wrappers/javascript/src/_wasm_integrity.ts << EOF
          // Auto-generated by CI — do not edit.
          export const EXPECTED_SHA256 = "$HASH";
          EOF
      - working-directory: wrappers/javascript
        run: |
          npm ci
          npm run typecheck
          npm run lint
          npm audit --omit=dev --audit-level=high
          # Build BEFORE tests: tests/edge_runtime.test.ts and
          # tests/runtime/workers.test.ts load the published bundle
          # (``dist/index.cjs``, ``dist/advanced.cjs``) into a
          # @edge-runtime/vm and miniflare to verify the actual ship
          # artefact runs on WinterCG / Workers. Running tests against
          # source would defeat the property; the bundle has to exist
          # first.
          npm run build
          npm run test:coverage
          npm run publint
          npm run attw

  # Aggregator status check. Branch protection points at this single
  # job — adding/renaming jobs is automatically picked up as long as
  # the new job is in `needs:`.
  all-checks-passed:
    if: always()
    needs: [wasm-build, rust, python, javascript]
    runs-on: ubuntu-latest
    steps:
      - name: Verify every required job succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || \
                "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
