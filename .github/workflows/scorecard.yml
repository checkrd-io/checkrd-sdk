name: OpenSSF Scorecard

# OpenSSF Scorecard rates the security posture of an OSS project on
# 18 dimensions (branch protection, code review, signed releases,
# pinned actions, SAST coverage, secret scanning, etc.) and publishes
# the score back as a GitHub security alert + an optional badge in
# the README. Mandatory for projects that want to be picked up by
# downstream "trusted upstream" lists at large enterprises.
#
# Runs on a weekly schedule (drift detection) and on every push to
# main (immediate feedback after policy changes).

on:
  schedule:
    - cron: "0 12 * * 1"   # Monday 12:00 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Required to upload the SARIF results to code-scanning.
      security-events: write
      # Required to publish the result as a GitHub workflow run badge.
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # ``publish_results`` opts the score into the OpenSSF
          # transparency log so the badge in README.md (and any
          # downstream "best practices" check) can read it without
          # API keys.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v3
        with:
          sarif_file: results.sarif
