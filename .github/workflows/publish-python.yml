name: Publish Python SDK

on:
  push:
    tags:
      - "python-v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: wasm-build
      - run: cargo build --package checkrd-core --target wasm32-wasip1 --release
      - run: ./scripts/copy-wasm.sh
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: wrappers/python/pyproject.toml
      - working-directory: wrappers/python
        run: |
          # Bring pip itself current before resolving any deps. Keeps
          # the install pipeline clean without --ignore-vuln accumulating
          # against the installer.
          python -m pip install --upgrade pip
          # Use .[test] (not .[dev]) so vendor SDKs, interrogate, and
          # pip-audit are all present. Matches the PR CI path.
          pip install -e ".[test]"
          ruff check src/ tests/
          mypy src/
          # PYSEC-2022-42969: ReDoS in py.path.svnwc, transitive via
          # ``interrogate``. The vulnerable SvnWCCommandPath code path
          # is unreachable from anywhere we call.
          pip-audit --ignore-vuln PYSEC-2022-42969
          interrogate src/
          pytest tests/ --cov --cov-fail-under=80 --tb=short
          # Pre-publish guard: refuse to ship a release whose SDK
          # would silently reject every signed policy update because
          # ``_PRODUCTION_TRUSTED_KEYS`` is empty.
          python -m checkrd.cli policy trust-status \
              --base-url https://api.checkrd.io

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      # OIDC for PyPI Trusted Publishing — no long-lived token in the
      # repo. The Pending Publisher on pypi.org points at this exact
      # workflow + environment; the OIDC sub-claim authorises the
      # upload at the registry side.
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: wasm-build
      - run: cargo build --package checkrd-core --target wasm32-wasip1 --release
      - run: ./scripts/copy-wasm.sh
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: wrappers/python/pyproject.toml

      - name: Build sdist + wheel
        working-directory: wrappers/python
        run: |
          python -m pip install --upgrade pip
          pip install 'build>=1.0' 'twine>=5.0' 'check-wheel-contents>=0.6'
          python -m build
          # PyPI-side metadata validation (long-description renders,
          # license classifier present, URLs resolve).
          twine check dist/*
          # Structural wheel audit — no stray __pycache__, no editable
          # breadcrumbs, no unexpected top-level packages.
          check-wheel-contents dist/*.whl

      - name: Install sanity (fresh venv)
        working-directory: wrappers/python
        run: |
          python -m venv /tmp/checkrd-ship-test
          /tmp/checkrd-ship-test/bin/pip install --upgrade pip
          /tmp/checkrd-ship-test/bin/pip install dist/*.whl
          /tmp/checkrd-ship-test/bin/python - <<'PY'
          import checkrd
          assert checkrd.__version__, "version string missing"
          for name in ("Checkrd", "AsyncCheckrd", "CheckrdError", "RateLimitError", "make_api_error"):
              assert hasattr(checkrd, name), f"public symbol missing: {name}"
          print(f"ok: checkrd {checkrd.__version__} imports cleanly")
          PY

      - name: Generate SBOM (CycloneDX)
        working-directory: wrappers/python
        run: |
          /tmp/checkrd-ship-test/bin/pip install 'cyclonedx-bom>=4,<6'
          mkdir -p artifacts
          /tmp/checkrd-ship-test/bin/cyclonedx-py environment \
            -o artifacts/sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: checkrd-python-sbom
          path: wrappers/python/artifacts/sbom.json
          if-no-files-found: error

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: wrappers/python/dist/
